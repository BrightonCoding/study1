project:
  name: study1-homogeneity-engagement
  scrape_date: null
  random_seed: 20240617
niche:
  name: tech_reviews
  search_keywords:
  - smartphone review
  - laptop review
  - tech unboxing
  - best phone 2025
  - gadget review
  - iphone review
  - android review
  - headphones review
  - tech comparison
  - budget phone review
  - best laptop 2025
  - smartwatch review
  - camera review
  - pc build guide
  discover_per_keyword: 40
collection:
  backend: youtube_api
  max_channels: 80
  videos_per_channel: 120
  smoke:
    max_channels: 10
    videos_per_channel: 25
  concurrency: 6
  rate_limit_seconds: 1.0
  max_retries: 4
  retry_backoff_seconds: 2.0
  download_thumbnails: true
  thumbnail_pref:
  - maxresdefault
  - sddefault
  - hqdefault
  short_max_seconds: 60
youtube_api:
  api_key_env: YOUTUBE_API_KEY
  daily_quota_units: 10000
embedding:
  thumbnail_model: ViT-B-32
  thumbnail_pretrained: openai
  title_backend: sentence_transformers
  title_model: all-MiniLM-L6-v2
  combined:
    enabled: true
    thumbnail_weight: 1.0
    title_weight: 1.0
  device: auto
  batch_size: 32
features:
  trailing_window_n: 10
  rolling_window_k: 10
  min_uploads_for_week: 2
  niche_top_fraction: 0.1
  standardize_within_channel: true
analysis:
  cluster_by: channel_id
  min_videos_per_channel: 5
  variants:
  - thumbnail
  - title
  - combined
  add_week_dummies: false
paths:
  data_dir: data/tech_reviews
  raw_dir: data/tech_reviews/raw
  thumbnails_dir: data/tech_reviews/thumbnails
  embeddings_dir: data/tech_reviews/embeddings
  panels_dir: data/tech_reviews/panels
  seeds_dir: data/tech_reviews/seeds
  outputs_dir: outputs/tech_reviews
  tables_dir: outputs/tech_reviews/tables
  plots_dir: outputs/tech_reviews/plots
  logs_dir: outputs/tech_reviews/logs
  seed_channels_csv: data/tech_reviews/seeds/seed_channels.csv
  video_panel_parquet: data/tech_reviews/panels/video_panel.parquet
  channel_week_panel_parquet: data/tech_reviews/panels/channel_week_panel.parquet
  longitudinal_parquet: data/tech_reviews/panels/longitudinal_snapshots.parquet
